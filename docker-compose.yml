version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sga-postgres
    environment:
      POSTGRES_USER: sga_user
      POSTGRES_PASSWORD: sga_password
      POSTGRES_DB: sga_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sga-net

  redis:
    image: redis:7-alpine
    container_name: sga-redis
    ports:
      - "6379:6379"
    networks:
      - sga-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sga-backend
    ports:
      - "8000:8000"
    environment:
